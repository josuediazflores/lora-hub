# Gemma 4 E4B — Sky-T1 reasoning-distill LoRA
# Expected runtime on 1× MI300X: ~3 h for 2 epochs at seq_len 4096.
# Only difference from the E2B config: base model + batch sizing.

base_model: google/gemma-4-E4B-it
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

datasets:
  - path: NovaSky-AI/Sky-T1_data_17k
    type: chat_template
    chat_template: gemma
    field_messages: conversations
    message_field_role: from
    message_field_content: value
    roles:
      user: [human, user]
      assistant: [gpt, assistant]
      system: [system]

system_prompt: '{system}'

val_set_size: 0.02
output_dir: ./outputs/gemma4-e4b-skyt1

adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

bf16: true
fp16: false
gradient_checkpointing: true

# E4B is ~2× the weight memory of E2B; halve the micro-batch, double
# the grad-accum, keep effective batch at 16.
micro_batch_size: 4
gradient_accumulation_steps: 4

num_epochs: 2
optimizer: adamw_torch
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.03
weight_decay: 0.0

logging_steps: 20
evals_per_epoch: 2
saves_per_epoch: 2
save_total_limit: 3

flash_attention: false
sdp_attention: true

